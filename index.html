        /* ── TABLE ── */
        function buildTable(ch) {
          var total =
            ch.kind === "dated"
              ? ch.dates
                ? ch.dates.length
                : 0
              : ch.total || 0;
          var c = ch.cfg && ch.cfg.cols ? ch.cfg.cols : cols;
          var r = Math.ceil(total / c);
          var tbl = document.createElement("table");
          tbl.className = "chtbl";
          var hrow = document.createElement("tr");

          /* İlk hücre: zincirin başladığı yıl */
          var th0 = document.createElement("th");
          if (ch.kind === "dated" && ch.dates && ch.dates[0]) {
            th0.textContent = new Date(ch.dates[0] + "T00:00:00").getFullYear();
          } else {
            th0.textContent = "";
          }
          hrow.appendChild(th0);

          for (var ci = 0; ci < c; ci++) {
            var th = document.createElement("th");
            if (ch.kind === "dated" && ch.dates && ch.dates[ci]) {
              var colDay = new Date(ch.dates[ci] + "T00:00:00").getDay();
              th.textContent = t().dayNames[colDay];
            } else {
              th.textContent = String(ci + 1);
            }
            hrow.appendChild(th);
          }
          tbl.appendChild(hrow);

          var idx = 0;
          var prevRowYear =
            ch.kind === "dated" && ch.dates && ch.dates[0]
              ? new Date(ch.dates[0] + "T00:00:00").getFullYear()
              : null;

          for (var ri = 0; ri < r; ri++) {
            var tr = document.createElement("tr");
            var rth = document.createElement("th");
            if (ch.kind === "dated" && ch.dates && ch.dates[ri * c]) {
              var d0 = new Date(ch.dates[ri * c] + "T00:00:00");
              var thisYear = d0.getFullYear();
              if (ri === 0) {
                /* İlk satır: sadece ay adı (yıl zaten th0'da) */
                rth.textContent = d0.toLocaleDateString(t().locale, {
                  month: "long",
                });
              } else if (thisYear !== prevRowYear) {
                /* Yıl değişimi: "Oca 2027" formatı */
                rth.textContent = d0.toLocaleDateString(t().locale, {
                  month: "long",
                  year: "numeric",
                });
              } else {
                /* Aynı yıl, ay değişimi: sadece ay */
                rth.textContent = d0.toLocaleDateString(t().locale, {
                  month: "long",
                });
              }
              prevRowYear = thisYear;
            } else {
              rth.textContent =
                ri * c + 1 + "–" + Math.min((ri + 1) * c, total);
            }
            tr.appendChild(rth);
            for (var ci2 = 0; ci2 < c; ci2++) {
              var td = document.createElement("td");
              if (idx >= total) {
                td.classList.add("empty");
              } else {
                (function (i) {
                  if (ch.kind === "dated" && ch.dates && ch.dates[i]) {
                    var dd = new Date(ch.dates[i] + "T00:00:00");
                    td.textContent = String(dd.getDate());
                    td.title = dd.toLocaleDateString(t().locale, {
                      weekday: "long",
                      year: "numeric",
                      month: "long",
                      day: "numeric",
                    });
                    if (i > 0 && ch.dates[i - 1]) {
                      var pd = new Date(ch.dates[i - 1] + "T00:00:00");
                      if (pd.getFullYear() !== dd.getFullYear())
                        td.classList.add("yr");
                      else if (pd.getMonth() !== dd.getMonth())
                        td.classList.add("mo");
                    }
                  } else {
                    var mv =
                      ch.milestones && ch.milestones[i]
                        ? ch.milestones[i]
                        : i + 1;
                    td.textContent = String(mv);
                    td.title = String(mv);
                    td.classList.add("ms");
                  }
                  if (ch.marks && ch.marks[i]) td.appendChild(makeX());
                  if (ch.notes && ch.notes[i]) td.classList.add("has-note");
                  td.addEventListener("click", function () {
                    onCell(ch, i);
                  });
                  td.addEventListener("contextmenu", function (e) {
                    onRClick(e, ch, i);
                  });
                })(idx);
              }
              tr.appendChild(td);
              idx++;
            }
            tbl.appendChild(tr);
          }
          return tbl;
        }

        /* ── SNAKE ── */
        function getCsPx() {
          /* Snake modda --cs-snake (kare*1.27), table modda --cs */
          var prop = viewMode === "snake" ? "--cs-snake" : "--cs";
          var raw = getComputedStyle(document.documentElement)
            .getPropertyValue(prop)
            .trim();
          if (!raw || raw === "0px")
            raw = getComputedStyle(document.documentElement)
              .getPropertyValue("--cs")
              .trim();
          if (raw.indexOf("px") > -1) return parseFloat(raw) || 32;
          var fz =
            parseFloat(getComputedStyle(document.documentElement).fontSize) ||
            16;
          return parseFloat(raw) * fz || 32;
        }

        function buildSnake(ch, wrapEl) {
          var total =
            ch.kind === "dated"
              ? ch.dates
                ? ch.dates.length
                : 0
              : ch.total || 0;
          var cont = document.createElement("div");
          cont.className = "snake-cont";

          function render() {
            var csPx = getCsPx();
            var gap = Math.round(csPx * 0.25);
            var cellW = csPx + gap;
            var protrude = Math.round(csPx * 0.75);

            /* wrapEl'e padding ver — köşeler bu alana taşar */
            wrapEl.style.paddingLeft = protrude + "px";
            wrapEl.style.paddingRight = protrude + "px";
            wrapEl.style.boxSizing = "border-box";

            /* Kullanılabilir iç genişlik: chain-col'dan ölç (wrapEl overflow:visible iken güvenilir) */
            var chainCol = document.getElementById("chain-col");
            var colW = chainCol
              ? chainCol.clientWidth
              : window.innerWidth - 380;
            /* chain-card padding: 0.7rem*2 ≈ 22px, border 0.5rem*2 ≈ 16px → ~38px
               + dikey scrollbar payı (~18px) ki scroll çubuğu kenar halkaları ezmesin */
            var fz =
              parseFloat(getComputedStyle(document.documentElement).fontSize) ||
              16;
            var cardPad = Math.round(fz * 1.4) + 16 + 20;
            /* İç genişlik: toplam - card padding - protrude*2 (her iki yanda köşe payı) */
            var innerW = colW - cardPad - protrude * 2;
            innerW = Math.max(cellW, innerW);

            var cols = Math.max(1, Math.floor(innerW / cellW));
            var rowW = cols * cellW;

            cont.innerHTML = "";
            cont.style.width = rowW + "px";
            /* margin:auto ile wrapEl padding alanı içinde ortala */
            cont.style.marginLeft = "auto";
            cont.style.marginRight = "auto";

            var remaining = total,
              idx = 0,
              leftToRight = true;

            while (remaining > 0) {
              var count = Math.min(cols, remaining);
              var row = document.createElement("div");
              row.className = "snake-row";
              row.style.flexDirection = leftToRight ? "row" : "row-reverse";
              row.style.width = rowW + "px";
              row.style.marginLeft = "0";
              row.style.marginTop = "0";
              row.style.marginBottom = "0";
              row.style.gap = gap + "px";
              for (var i = 0; i < count; i++)
                row.appendChild(mkCircle(ch, idx++));
              cont.appendChild(row);
              remaining -= count;
              if (remaining <= 0) break;

              var srow = document.createElement("div");
              srow.className = "snake-row";
              srow.style.width = rowW + protrude * 2 + "px";
              srow.style.justifyContent = leftToRight
                ? "flex-end"
                : "flex-start";
              srow.style.marginLeft = -protrude + "px";
              srow.style.marginTop = csPx * 0.25 + "px";
              srow.style.marginBottom = csPx * 0.25 + "px";
              srow.appendChild(mkCircle(ch, idx++));
              cont.appendChild(srow);
              remaining--;
              leftToRight = !leftToRight;
            }
          }

          /* RAF ensures wrapEl is in DOM and has layout */
          requestAnimationFrame(function () {
            render();
            /* Double-render after short delay: catches any residual layout shift */
            setTimeout(function () {
              render();
            }, 80);

            if (window.ResizeObserver) {
              var _lastW = 0,
                _busy = false;
              var ro = new ResizeObserver(function () {
                var w = wrapEl.clientWidth;
                if (_busy || Math.abs(w - _lastW) < 1) return;
                _lastW = w;
                _busy = true;
                requestAnimationFrame(function () {
                  render();
                  _busy = false;
                });
              });
              ro.observe(wrapEl);
              wrapEl._snakeRO = ro;
            }
            wrapEl._snakeRender = render;
          });

          return cont;
        }
        /* ── ARC HELPER ── */
        function makeArc(spanFrac, color, strokePx, label) {
          var svg = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "svg",
          );
          svg.classList.add("arc-svg");
          /* viewBox: unit circle centered at 0,0. We enlarge by 0.5 extra for label space */
          svg.setAttribute("viewBox", "-1.6 -1.6 3.2 3.2");

          var halfAngle = spanFrac * Math.PI;
          var startAngle = -Math.PI / 2 - halfAngle;
          var endAngle = -Math.PI / 2 + halfAngle;
          var r = 1.08; /* slightly outside the 1-unit circle */
          var x1 = Math.cos(startAngle) * r,
            y1 = Math.sin(startAngle) * r;
          var x2 = Math.cos(endAngle) * r,
            y2 = Math.sin(endAngle) * r;
          var largeArc = halfAngle * 2 > Math.PI ? 1 : 0;

          var path = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path",
          );
          path.setAttribute(
            "d",
            "M" +
              x1.toFixed(4) +
              "," +
              y1.toFixed(4) +
              " A" +
              r +
              "," +
              r +
              " 0 " +
              largeArc +
              ",1 " +
              x2.toFixed(4) +
              "," +
              y2.toFixed(4),
          );
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", color);
          path.setAttribute(
            "stroke-width",
            strokePx,
          ); /* will be in px via non-scaling-stroke */
          path.setAttribute("vector-effect", "non-scaling-stroke");
          path.setAttribute("stroke-linecap", "round");
          svg.appendChild(path);

          if (label) {
            /* label sits at 12 o'clock, just above arc */
            var txt = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "text",
            );
            txt.setAttribute("x", "0");
            txt.setAttribute("y", (-r - 0.28).toFixed(4));
            txt.setAttribute("text-anchor", "middle");
            txt.setAttribute("dominant-baseline", "auto");
            txt.setAttribute("font-size", "0.38");
            txt.setAttribute("fill", color);
            txt.setAttribute("font-weight", "700");
            txt.setAttribute("vector-effect", "non-scaling-stroke");
            txt.textContent = label;
            svg.appendChild(txt);
          }
          return svg;
        }

        function mkCircle(ch, idx) {
          var el = document.createElement("div");
          el.className = "circle-cell";
          if (ch.kind === "dated" && ch.dates && ch.dates[idx]) {
            var dd = new Date(ch.dates[idx] + "T00:00:00");
            el.textContent = String(dd.getDate());
            el.title = dd.toLocaleDateString(t().locale, {
              weekday: "long",
              year: "numeric",
              month: "long",
              day: "numeric",
            });
            var isFirst = idx === 0,
              isYr = false,
              isMo = false;
            if (idx > 0 && ch.dates[idx - 1]) {
              var pd = new Date(ch.dates[idx - 1] + "T00:00:00");
              if (pd.getFullYear() !== dd.getFullYear()) {
                isYr = true;
                isFirst = true;
              } else if (pd.getMonth() !== dd.getMonth()) {
                isMo = true;
                isFirst = true;
              }
            }
            if (isFirst) {
              /* Orijinal HTML gibi: basit metin etiketi, arc yok */
              var lab = document.createElement("div");
              lab.className = "month-lbl";
              var monthName = dd.toLocaleDateString(t().locale, {
                month: "long",
              });
              lab.textContent =
                isYr || idx === 0
                  ? monthName + " " + dd.getFullYear()
                  : monthName;
              el.appendChild(lab);
            }
          } else {
            var mv =
              ch.milestones && ch.milestones[idx]
                ? ch.milestones[idx]
                : idx + 1;
            el.textContent = String(mv);
            el.title = String(mv);
            el.classList.add("ms");
          }
          if (ch.marks && ch.marks[idx]) el.appendChild(makeX());
          if (ch.notes && ch.notes[idx]) el.classList.add("has-note");
          (function (i) {
            el.addEventListener("click", function () {
              onCell(ch, i);
            });
            el.addEventListener("contextmenu", function (e) {
              onRClick(e, ch, i);
            });
          })(idx);
          return el;
        }

        /* ── MODALS ── */

        function openNote(ch, idx) {
          _nch = ch;
          _nidx = idx;
          var label =
            ch.kind === "dated" && ch.dates && ch.dates[idx]
              ? new Date(ch.dates[idx] + "T00:00:00").toLocaleDateString(
                  t().locale,
                  { day: "numeric", month: "long", year: "numeric" },
                )
              : idx + 1 + (lang === "tr" ? ". halka" : ". ring");
          mnTitle.textContent = t().noteTitle + " — " + label;
          mnInput.placeholder = t().notePH;
          mnInput.value = (ch.notes && ch.notes[idx]) || "";
          id("mn-ok").textContent = t().noteOk;
          id("mn-cancel").textContent = t().noteCancel;
          id("mn-clear").textContent = t().noteClear;
          modalNote.style.display = "flex";
          setTimeout(function () {
            mnInput.focus();
          }, 50);
        }
        id("mn-ok").addEventListener("click", function () {
          if (_nch === null) return;
          if (!_nch.notes) _nch.notes = {};
          var v = mnInput.value.trim();
          if (v) _nch.notes[_nidx] = v;
          else delete _nch.notes[_nidx];
          save(_nch);
          modalNote.style.display = "none";
          setNoteMode(false);
          renderAll();
        });
        id("mn-clear").addEventListener("click", function () {
          if (_nch && _nch.notes) delete _nch.notes[_nidx];
          if (_nch) save(_nch);
          modalNote.style.display = "none";
          setNoteMode(false);
          renderAll();
        });
        id("mn-cancel").addEventListener("click", function () {
          modalNote.style.display = "none";
          setNoteMode(false);
        });
        [modalNote].forEach(function (m) {
          m.addEventListener("click", function (e) {
            if (e.target === m) {
              m.style.display = "none";
              setNoteMode(false);
            }
          });
        });

        /* ── VALIDATE & CREATE ── */
        function validate() {
          var ok = true;
          [errName, errDate, errWd, errCount].forEach(function (e) {
            e.style.display = "none";
          });
          inpName.classList.remove("input-error");
          if (!inpName.value.trim()) {
            showErr(errName, t().errName);
            inpName.classList.add("input-error");
            inpName.focus();
            ok = false;
          } else if (inpName.value.trim() === "?") {
            /* "?" yardım sembolüyle karışmaması için yasak */
            showErr(errName, t().errNameReserved);
            inpName.classList.add("input-error");
            inpName.focus();
            ok = false;
          } else {
            /* Aynı adlı zincir var mı? (boşluk farkı/case yoksay) */
            var newName = inpName.value.trim().toLowerCase();
            var existing = gs().items;
            for (var eid in existing) {
              if (
                existing[eid] &&
                existing[eid].name &&
                existing[eid].name.trim().toLowerCase() === newName
              ) {
                showErr(errName, t().errNameDup);
                inpName.classList.add("input-error");
                inpName.focus();
                ok = false;
                break;
              }
            }
          }
          if (kind === "dated") {
            if (!inpStart.value || !inpEnd.value) {
              showErr(
                errDate,
                lang === "tr"
                  ? "Başlangıç ve bitiş tarihi girin."
                  : "Enter start and end dates.",
              );
              ok = false;
            } else {
              var sd = new Date(inpStart.value + "T00:00:00"),
                ed = new Date(inpEnd.value + "T00:00:00");
              if (ed < sd) {
                showErr(
                  errDate,
                  lang === "tr"
                    ? "Bitiş tarihi başlangıçtan önce olamaz!"
                    : "End date must be after start date!",
                );
                ok = false;
              } else if (n > MAX) {
                showErr(
                  errDate,
                  (lang === "tr" ? "Halka sayısı " : "Ring count exceeds ") +
                    MAX +
                    (lang === "tr"
                      ? " sınırını aşıyor (" + n + ")."
                      : " (currently: " + n + ")."),
                );
                ok = false;
              } else if (n < 1) {
                showErr(
                  errDate,
                  lang === "tr"
                    ? "Geçerli tarih aralığı ve gün seçin."
                    : "Select a valid date range and days.",
                );
                ok = false;
              }
            }
            if (ok && !Object.keys(getPicked()).length) {
              showErr(errWd, t().errAtLeast);
              ok = false;
            }
          } else {
            var steps = parseSteps(
              inpTotal.value,
              inpRingsCount ? inpRingsCount.value : 7,
              inpStep.value,
            );
            if (!steps || !steps.length) {
              showErr(
                errCount,
                lang === "tr"
                  ? "Geçerli hedef/halka değeri girin."
                  : "Enter valid target/ring values.",
              );
              ok = false;
            } else if (steps.length > MAX) {
              showErr(
                errCount,
                (lang === "tr" ? "Halka sayısı " : "Ring count exceeds ") +
                  MAX +
                  (lang === "tr" ? " sınırını aşıyor." : "."),
              );
              ok = false;
            }
          }
          return ok;
        }
        function createChain() {
          if (!validate()) return;
          var c = Math.max(1, parseInt(inpCols.value) || cols),
            r = Math.max(1, parseInt(inpRows.value) || rows);
          if (r * c < n) r = Math.ceil(n / c);
          var ch;
          if (kind === "dated") {
            ch = {
              id: rid(),
              kind: "dated",
              name: inpName.value.trim(),
              dates: currentDates.slice(),
              cfg: { cols: c, rows: r },
              marks: {},
              notes: {},
              created: nowS(),
            };
          } else {
            var steps2 = parseSteps(
              inpTotal.value,
              inpRingsCount ? inpRingsCount.value : 7,
              inpStep.value,
            );
            /* total = hedef değer (son milestone), milestones = tüm adımlar, her biri bir halka */
            var targetVal = steps2[steps2.length - 1];
            ch = {
              id: rid(),
              kind: "count",
              name: inpName.value.trim(),
              total: steps2.length /* halka sayısı */,
              targetValue: targetVal /* asıl hedef (sayfa, dk, vs.) */,
              milestones: steps2,
              cfg: { cols: c, rows: r },
              marks: {},
              notes: {},
              created: nowS(),
            };
          }
          var s = gs();
          s.items[ch.id] = ch;
          s.order.push(ch.id);
          ss(s);
          activeId = ch.id;
          resetForm();
          renderAll();
          setActive(ch.id);
        }

        /* ── BACKUP ── */
        function download() {
          var s = gs();
          if (!s.order.length) {
            showErr(errBackup, t().noChain);
            return;
          }
          var payload = JSON.parse(JSON.stringify(s));
          var th = localStorage.getItem(TK) || "";
          if (th) payload.theme = th;
          var blob = new Blob([JSON.stringify(payload, null, 2)], {
            type: "application/json",
          });
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "zincirler.json";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
        }
        function valImp(imp) {
          if (!imp || typeof imp !== "object") return "notObject";
          if (!imp.items || typeof imp.items !== "object")
            return "missingItems";
          var ids = Object.keys(imp.items);
          for (var i = 0; i < ids.length; i++) {
            var ch = imp.items[ids[i]];
            if (!ch || typeof ch !== "object") return "invalidChain";
            if (!ch.id) return "missingId";
            if (
              ch.kind === "dated" &&
              (!Array.isArray(ch.dates) || !ch.dates.length)
            )
              return "invalidDates";
            if (
              ch.kind === "count" &&
              (typeof ch.total !== "number" || ch.total < 1)
            )
              return "missingTotal";
          }
          return null;
        }
        function loadFile(ev) {
          var file = ev.target.files && ev.target.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function (e) {
            var imp;
            try {
              imp = JSON.parse(e.target.result);
            } catch (ex) {
              alert(t().badJson);
              return;
            }
            var err = valImp(imp);
            if (err) {
              alert(t().badFile + err);
              return;
            }
            var cur = gs();
            Object.keys(imp.items).forEach(function (id) {
              if (!cur.items[id]) {
                cur.items[id] = imp.items[id];
                cur.order.push(id);
              }
            });
            ss(cur);
            if (imp.theme) applyTheme(imp.theme);
            renderAll();
            alert(t().loadOk);
          };
          reader.readAsText(file, "utf-8");
        }

        /* ── RESET ── */
        function resetForm() {
          inpName.value = "";
          inpName.classList.remove("input-error");
          [errName, errDate, errWd, errCount, errBackup].forEach(function (e) {
            e.style.display = "none";
          });
          for (var i = 0; i < kindRadios.length; i++)
            kindRadios[i].checked = kindRadios[i].value === "dated";
          wdChecks.forEach(function (c) {
            c.checked = true;
          });
          inpTotal.value = "210";
          inpStep.value = "";
          if (inpRingsCount) inpRingsCount.value = "7";
          var today = new Date();
          inpStart.value = toISO(today);
          var later = new Date(today);
          later.setDate(later.getDate() + 364);
          inpEnd.value = toISO(later);
          kind = "dated";
          syncMode();
        }

        /* ── EVENTS ── */
        btnToggle.addEventListener("click", function () {
          var panelCol = document.getElementById("panel-col");
          var isMobile = window.innerWidth <= 899;
          var col = panelCol.classList.toggle("collapsed");
          if (isMobile) {
            /* Mobil: dikey kapanma — ▲ açık, ▼ kapalı */
            btnToggle.textContent = col ? "▼" : "▲";
          } else {
            /* Masaüstü: yatay kapanma — ◀ açık, ▶ kapalı */
            btnToggle.textContent = col ? "▶" : "◀";
          }
          localStorage.setItem(CK, col ? "1" : "");
          setTimeout(function () {
            if (viewMode === "snake") reRenderSnakes();
          }, 350);
        });
        btnView.addEventListener("click", function () {
          viewMode = viewMode === "table" ? "snake" : "table";
          btnView.classList.toggle("alt", viewMode === "snake");
          var ic = btnView.querySelector("i");
          if (ic)
            ic.className =
              "fa-solid " +
              (viewMode === "snake" ? "fa-worm" : "fa-table-cells");
          localStorage.setItem(VK, viewMode);
          applySnakeScrollMode();
          renderAll();
        });

        if (btnHelp) {
          btnHelp.addEventListener("click", function () {
            activeId = HELP_ID;
            renderAll();
          });
        }

        if (btnBgToggle) {
          /* 4 seviyeli opacity (artan): 0 (kapalı) -> 0.3 -> 0.6 -> 0.9 -> başa dön
             Buton seviye 0'da en saydam, seviye 3'te tam belirgin (senkron) */
          var BG_LEVELS = [0, 0.3, 0.6, 0.9];
          var DEFAULT_BG_IDX = 1; /* başlangıç: 0.3 */
          var bgLevel = parseInt(localStorage.getItem(BGOK), 10);
          if (isNaN(bgLevel) || bgLevel < 0 || bgLevel >= BG_LEVELS.length) {
            bgLevel = DEFAULT_BG_IDX;
          }
          /* Eski kullanılmayan key'i temizle (varsa) */
          try { localStorage.removeItem("zkm2_bgvis"); } catch (e) {}
          function applyBgLevel(idx) {
            var op = BG_LEVELS[idx];
            document.body.style.setProperty("--bg-chain-opacity", op);
            var off = op === 0;
            document.body.classList.toggle("bg-off", off);
            /* Buton üzerinde kademeli class: bg-lvl-0..3 (arka planla senkron) */
            for (var i = 0; i < BG_LEVELS.length; i++) {
              btnBgToggle.classList.toggle("bg-lvl-" + i, i === idx);
            }
            btnBgToggle.classList.toggle("bg-off", off);
            localStorage.setItem(BGOK, String(idx));
          }
          applyBgLevel(bgLevel);
          btnBgToggle.addEventListener("click", function () {
            bgLevel = (bgLevel + 1) % BG_LEVELS.length;
            applyBgLevel(bgLevel);
          });
        }
        for (var i = 0; i < kindRadios.length; i++)
          kindRadios[i].addEventListener("change", syncMode);
        wdChecks.forEach(function (c) {
          c.addEventListener("change", updateCount);
        });
        inpStart.addEventListener("change", updateCount);
        inpEnd.addEventListener("change", updateCount);
        inpTotal.addEventListener("input", updateCount);
        inpStep.addEventListener("input", updateCount);
        if (inpRingsCount) inpRingsCount.addEventListener("input", updateCount);
        inpCols.addEventListener("change", function () {
          cols = Math.max(1, parseInt(inpCols.value) || 1);
          rows = Math.ceil(n / cols) || 1;
          inpRows.value = rows;
          updateLT();
        });
        inpRows.addEventListener("change", function () {
          rows = Math.max(1, parseInt(inpRows.value) || 1);
          cols = Math.ceil(n / rows) || 1;
          inpCols.value = cols;
          updateLT();
        });
        btnAdd.addEventListener("click", createChain);
        btnLoad.addEventListener("click", function () {
          fileInput.value = "";
          fileInput.click();
        });
        fileInput.addEventListener("change", loadFile);
        btnDl.addEventListener("click", download);
        btnReset.addEventListener("click", resetForm);
        /* snake modda scroll yönetimi */
        function applySnakeScrollMode() {
          var chainCol = document.getElementById("chain-col");
          var cl = document.getElementById("chain-list");
          if (viewMode === "snake") {
            if (chainCol) chainCol.classList.add("snake-scroll");
            if (cl) cl.classList.add("snake-list");
          } else {
            if (chainCol) chainCol.classList.remove("snake-scroll");
            if (cl) cl.classList.remove("snake-list");
          }
        }

        /* re-render all visible snake grids */
        function reRenderSnakes() {
          document
            .querySelectorAll(".grid-wrap.snake-mode")
            .forEach(function (gw) {
              if (gw._snakeRender) requestAnimationFrame(gw._snakeRender);
            });
          /* Render bitince arka plan yüksekliklerini güncelle */
          requestAnimationFrame(function () {
            document
              .querySelectorAll(".chain-card.snake-card")
              .forEach(function (c) {
                if (c.style.display !== "none") updateSnakeBgHeight(c);
              });
          });
        }

        (function () {
          var busy = false;
          var _lastMobile = window.innerWidth <= 899;
          function onResize() {
            /* Toggle okunu viewport değişimine göre güncelle */
            var isMobile = window.innerWidth <= 899;
            if (isMobile !== _lastMobile) {
              _lastMobile = isMobile;
              var col = document
                .getElementById("panel-col")
                .classList.contains("collapsed");
              btnToggle.textContent = col
                ? isMobile
                  ? "▼"
                  : "▶"
                : isMobile
                  ? "▲"
                  : "◀";
            }
            if (viewMode !== "snake" || busy) return;
            busy = true;
            requestAnimationFrame(function () {
              applyCS(parseInt(slider.value));
              reRenderSnakes();
              setTimeout(function () {
                busy = false;
              }, 150);
            });
          }
          window.addEventListener("resize", onResize, { passive: true });
          if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", onResize, {
              passive: true,
            });
          }
        })();

        /* ── INIT ── */
        (function () {
          /* restore viewMode */
          var savedView = localStorage.getItem(VK) || "table";
          viewMode = savedView;
          if (viewMode === "snake") {
            btnView.classList.add("alt");
            var ic = btnView.querySelector("i");
            if (ic) ic.className = "fa-solid fa-worm";
            applySnakeScrollMode();
          }
          /* restore collapsed — now targets panel-col */
          if (localStorage.getItem(CK) === "1") {
            var panelCol = document.getElementById("panel-col");
            panelCol.classList.add("collapsed");
            btnToggle.textContent = window.innerWidth <= 899 ? "▼" : "▶";
          } else {
            btnToggle.textContent = window.innerWidth <= 899 ? "▲" : "◀";
          }
        })();

        resetForm();
        /* apply lang UI labels after form reset (resetForm calls syncMode which sets placeholder) */
        applyLangUI();
        renderAll();

        /* cell size knob */
        (function () {
          var slider = document.getElementById("cell-size-slider");
          var valLabel = document.getElementById("cell-size-val");
          var saved = parseInt(localStorage.getItem(CSK)) || 64;
          slider.value = saved;
          applyCS(saved);
          function applyCS(px) {
            /* Responsive: snake modda ekrana göre max sınır */
            var w = window.innerWidth;
            var maxPx = px;
            if (viewMode === "snake") {
              if (w <= 350) maxPx = Math.min(px, 85);
              else if (w <= 400) maxPx = Math.min(px, 90);
              else if (w <= 480) maxPx = Math.min(px, 95);
            }
            document.documentElement.style.setProperty("--cs", maxPx + "px");
            /* Yılan modu: kare kenarının 1.27 katı çap */
            document.documentElement.style.setProperty(
              "--cs-snake",
              Math.round(maxPx * 1.27) + "px",
            );
            valLabel.textContent = px;
            var pct = Math.round(((px - 25) / (100 - 25)) * 100);
            slider.style.setProperty("--pct", pct + "%");
            localStorage.setItem(CSK, px);
          }
          slider.addEventListener("input", function () {
            applyCS(parseInt(slider.value));
            /* CSS var update needs a frame to propagate, then re-render */
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                reRenderSnakes();
              });
            });
          });
        })();
      })();
    </script>
    <template id="help-content-tpl-tr">
      <h3 style="margin: 0 0 0.6rem; font-size: 1rem; color: var(--ctitle)">
        🔗 Zinciri Kırma Yöntemi Nedir?

        Zinciri Kırma (<em>Don't Break the Chain</em>), Jerry Seinfeld'e
        atfedilen bir üretkenlik ve alışkanlık oluşturma tekniğidir. Temel fikir
        son derece basittir: her gün hedefinizi gerçekleştirdiğinizde o günü
        işaretlersiniz. Günler üst üste gelince bir "zincir" oluşur — ve o
        zinciri kırmamalısınız.
      </p>

      </h4>
      <ol
        style="
          margin: 0 0 0.7rem;
          padding-left: 1.2rem;
          line-height: 1.7;
          font-size: 0.88rem;
        "
